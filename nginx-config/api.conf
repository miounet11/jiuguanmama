# TavernAI Plus API 配置 - api.isillytavern.com
server {
    listen 80;
    server_name api.isillytavern.com;

    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.isillytavern.com;

    # SSL 证书配置（请替换为您的证书路径）
    ssl_certificate /etc/ssl/certs/api.isillytavern.com.pem;
    ssl_certificate_key /etc/ssl/private/api.isillytavern.com.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # API 路由
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_buffering off;
        proxy_cache off;

        # CORS 头部（允许前端域名访问）
        add_header 'Access-Control-Allow-Origin' 'https://www.isillytavern.com' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        # 处理预检请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态文件服务（上传的文件）
    location /uploads/ {
        proxy_pass http://localhost:3001;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API 健康检查
    location /health {
        proxy_pass http://localhost:3001/health;
        access_log off;
    }

    # 速率限制（可选）
    limit_req zone=api burst=20 nodelay;
    limit_req_status 429;

    # 错误页面
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        return 503 "API Service Unavailable\n";
        add_header Content-Type text/plain;
    }
}

# 定义速率限制区域（需要添加到 nginx.conf 中）
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
